name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run Playwright tests
        # WebKit's headless mode on Linux is unstable on CI runners and crashes
        # with "Operation was cancelled; maybe frame was detached?" at the first
        # navigation. Running it under a virtual display (xvfb, installed by
        # `playwright install --with-deps webkit`) gives WebKit a real display
        # server and makes it reliable. Chromium/Firefox are fine headless.
        run: |
          if [ "${{ matrix.browser }}" = "webkit" ]; then
            xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" \
              npx playwright test --project=webkit --retries=2
          else
            npx playwright test --project=${{ matrix.browser }} --retries=2
          fi
        env:
          USERNAME: ${{ secrets.ORANGEHRM_USERNAME }}
          PASSWORD: ${{ secrets.ORANGEHRM_PASSWORD }}

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ matrix.browser }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7
