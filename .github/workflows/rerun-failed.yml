name: Re-run failed jobs

# Automatically re-runs only the failed jobs of the "Playwright Tests" workflow
# when a run fails, to absorb transient CI flakes (e.g. the shared demo site
# being temporarily unreachable). The first-attempt guard prevents infinite loops.

on:
  workflow_run:
    workflows: ["Playwright Tests"]
    types: [completed]

permissions:
  actions: write

jobs:
  rerun:
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.run_attempt < 2
    runs-on: ubuntu-latest
    steps:
      - name: Re-run failed jobs
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.actions.rerunWorkflowFailedJobs({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.payload.workflow_run.id,
            });
